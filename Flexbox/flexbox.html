<!DOCTYPE html>
<html lang="pt-Br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .flexbox{
            height: 250px;
            border: 3px solid red;
            display: flex;
            margin-bottom: 16px;
        }

        .flexbox div{
            border: 2px solid orange;
            width: 150px;
            margin: 15px;
        }

        .flex-container1{
            flex-flow: row wrap;
        }

        .flex-container2 div{
            width: 30px ;
            margin: 0;
        }

        .flex-container2{
            justify-content: space-evenly;
        }

        .flex-container3{
            justify-content: space-around;
            align-items: center;

        }

        .flex-container3 div{
            margin: 0;
            width: 30px;
        }

        .flex-container4{
            justify-content: center;
           /* align-items: flex-end; */
            align-content: stretch;
            flex-wrap: wrap;

        }

        .flex-container4 div{
            width: 100px;
        }

        .flex-container5{
            justify-content: flex-end;
            align-items: flex-start;
        }

        .flex-container5 div{
            background-color: yellow;
            width: 50px;
            height: 50px;
        }

        .flex-container6{
            justify-content: flex-end;
            align-items: flex-start;
            flex-direction: column;
        }

        .flex-container6 div{
            background-color: yellow;
            width: 50px;
            height: 50px;
        }

        .flex-container6 .div2{
            flex-basis: 200px;
        }

        .flex-container7{
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 15px;
        }

        .flex-container7 div{
            flex-basis: 50px;
            background-color: orange;
            flex-grow: 1;
        }

        .flex-container8{
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 15px;
        }
        
        .flex-container8 div{
            background-color: crimson;
            flex-basis: 150px;

        }

        .flex-container8 .div3{
            flex-shrink: 2;
        }

        .flex-container9{
            justify-content: center;
            align-items: center;
            margin: 0;
            gap: 15px;
        }

        .flex-container9 div{
            background-color: green;
        }

        .flex-container9 .div3{
            order: 1;
        }
    </style>
    <title>Flexbox</title>
</head>
<body>
    <div class="flexbox flex-container1">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div class="flexbox flex-container2">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container3">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container4">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container5">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container6">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container7">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container8">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>

    <div>
        <div class="flexbox flex-container9">
        <div class="div1">1</div>
        <div class="div2">2</div>
        <div class="div3">3</div>
        <div class="div4">4</div>
    </div>
</body>
</html>
